<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RBI Desktop</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
    </div>

    <h1>RBI Desktop</h1>
    <p class="subtitle">Sign in to access your remote desktop</p>

    <div class="alert" id="alert" role="alert" aria-live="polite"></div>

    <form id="loginForm" action="/login" method="POST" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>
        <span class="field-error" id="usernameError"></span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility" tabindex="-1">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
    </form>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');
    const alert = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');
    const togglePw = document.getElementById('togglePw');
    const eyeIcon = document.getElementById('eyeIcon');

    // Password visibility toggle
    togglePw.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // Clear field errors on input
    usernameInput.addEventListener('input', () => {
      usernameInput.classList.remove('invalid');
      usernameError.textContent = '';
    });
    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('invalid');
      passwordError.textContent = '';
    });

    function showAlert(message, type = 'error') {
      alert.textContent = message;
      alert.className = `alert visible ${type}`;
    }

    function clearAlert() {
      alert.textContent = '';
      alert.className = 'alert';
    }

    function setLoading(loading) {
      submitBtn.classList.toggle('loading', loading);
      submitBtn.disabled = loading;
      usernameInput.disabled = loading;
      passwordInput.disabled = loading;
    }

    function validate() {
      let valid = true;
      clearAlert();

      if (!usernameInput.value.trim()) {
        usernameInput.classList.add('invalid');
        usernameError.textContent = 'Username is required.';
        valid = false;
      }
      if (!passwordInput.value) {
        passwordInput.classList.add('invalid');
        passwordError.textContent = 'Password is required.';
        valid = false;
      }
      return valid;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      setLoading(true);

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            password: passwordInput.value,
          }),
          credentials: 'same-origin',
        });

        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          window.location.href = data.redirect || '/';
        } else if (res.status === 401) {
          showAlert('Incorrect username or password.');
          passwordInput.value = '';
          passwordInput.classList.add('invalid');
        } else {
          showAlert('Server error. Please try again later.', 'warning');
        }
      } catch {
        showAlert('Unable to reach the server. Check your connection.', 'warning');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
