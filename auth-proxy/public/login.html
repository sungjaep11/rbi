<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RBI Desktop</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
    </div>

    <h1>RBI Desktop</h1>
    <p class="subtitle">Sign in to access your remote desktop</p>

    <div class="alert" id="alert" role="alert" aria-live="polite"></div>

    <form id="loginForm" action="/login" method="POST" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>
        <span class="field-error" id="usernameError"></span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility" tabindex="-1">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Sign In</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
    </form>

    <div class="divider"><span>or</span></div>

    <a href="/auth/google" class="btn-google">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </a>
  </main>

  <script>
    // Show error if Google OAuth failed
    if (new URLSearchParams(window.location.search).get('error') === 'google') {
      document.getElementById('alert').textContent = 'Google 로그인에 실패했습니다. 다시 시도해주세요.';
      document.getElementById('alert').className = 'alert visible error';
    }

    // Unregister any Service Workers left behind by the webtop app.
    // They intercept fetch requests (including POST /login) and return stale
    // cached responses, causing "Server error" until a hard refresh clears them.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(r) { r.unregister(); });
      });
    }

    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');
    const alert = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');
    const togglePw = document.getElementById('togglePw');
    const eyeIcon = document.getElementById('eyeIcon');

    // Password visibility toggle
    togglePw.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // Clear field errors on input
    usernameInput.addEventListener('input', () => {
      usernameInput.classList.remove('invalid');
      usernameError.textContent = '';
    });
    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('invalid');
      passwordError.textContent = '';
    });

    function showAlert(message, type = 'error') {
      alert.textContent = message;
      alert.className = `alert visible ${type}`;
    }

    function clearAlert() {
      alert.textContent = '';
      alert.className = 'alert';
    }

    function setLoading(loading) {
      submitBtn.classList.toggle('loading', loading);
      submitBtn.disabled = loading;
      usernameInput.disabled = loading;
      passwordInput.disabled = loading;
    }

    function validate() {
      let valid = true;
      clearAlert();

      if (!usernameInput.value.trim()) {
        usernameInput.classList.add('invalid');
        usernameError.textContent = 'Username is required.';
        valid = false;
      }
      if (!passwordInput.value) {
        passwordInput.classList.add('invalid');
        passwordError.textContent = 'Password is required.';
        valid = false;
      }
      return valid;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      setLoading(true);

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            password: passwordInput.value,
          }),
          credentials: 'same-origin',
        });

        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          window.location.href = data.redirect || '/';
        } else if (res.status === 401) {
          showAlert('Incorrect username or password.');
          passwordInput.value = '';
          passwordInput.classList.add('invalid');
        } else {
          showAlert('Server error. Please try again later.', 'warning');
        }
      } catch {
        showAlert('Unable to reach the server. Check your connection.', 'warning');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
