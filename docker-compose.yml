services:
  auth-proxy:
    build: ./auth-proxy
    container_name: auth-proxy
    ports:
      - "8080:8080"
    environment:
      - WEBTOP_URL=http://webtop:3000
      - SESSION_SECRET=${SESSION_SECRET}
      - PORT=8080
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./auth-proxy/db:/app/db
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - webtop
    restart: unless-stopped

  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: webtop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
    volumes:
      - webtop-config:/config
      - ./static-web/selkies-dashboard:/usr/share/selkies/selkies-dashboard
    # NOT exposed to host — only accessible through auth-proxy
    restart: unless-stopped

volumes:
  webtop-config:
